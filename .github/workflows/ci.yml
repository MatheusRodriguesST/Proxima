name: CI

# When to run: on every push and every pull request.
on:
  push:
  pull_request:

# Cancel in-flight runs on the same branch when a new push arrives
# (avoids a queue of redundant builds and saves CI minutes).
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  ci:
    name: build, test, lint, fmt
    runs-on: ubuntu-latest
    steps:
      # 1. Pull the repo into the VM.
      - name: Checkout
        uses: actions/checkout@v4

      # 2. Install the stable Rust toolchain + the lint/fmt components.
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      # 3. Dependency cache: without it every build downloads and recompiles
      #    the world. With it, builds after the first are minutes faster.
      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      # 4. Formatting: fails if any file is not in rustfmt's style.
      #    --check changes nothing, only reports. (Locally, `cargo fmt` fixes it.)
      - name: Check formatting
        run: cargo fmt --all -- --check

      # 5. Lint: clippy catches pitfalls and non-idiomatic code.
      #    -D warnings turns every warning into an error -> the job fails.
      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      # 6. Build the whole workspace.
      - name: Build
        run: cargo build --workspace --verbose

      # 7. Test the whole workspace.
      - name: Test
        run: cargo test --workspace --verbose
